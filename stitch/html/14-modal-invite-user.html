<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Invite User Modal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#e9e7ee",
                        "secondary-fixed": "#d3e4fe",
                        "tertiary-fixed": "#62fae3",
                        "secondary": "#505f76",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f5f2f9",
                        "on-tertiary-fixed": "#00201c",
                        "inverse-primary": "#b8c3ff",
                        "surface-container-highest": "#e4e1e8",
                        "on-surface-variant": "#454650",
                        "surface-dim": "#dbd9df",
                        "on-secondary-fixed-variant": "#38485d",
                        "inverse-surface": "#303035",
                        "surface": "#fbf8ff",
                        "outline-variant": "#c6c5d2",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#3cddc7",
                        "surface-container": "#efedf3",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#0b1c30",
                        "on-error-container": "#93000a",
                        "outline": "#767681",
                        "on-background": "#1b1b20",
                        "surface-variant": "#e4e1e8",
                        "on-primary-container": "#8695dd",
                        "on-error": "#ffffff",
                        "on-secondary-container": "#54647a",
                        "on-tertiary-fixed-variant": "#005047",
                        "inverse-on-surface": "#f2f0f6",
                        "error": "#ba1a1a",
                        "primary-container": "#1a2b6d",
                        "primary": "#001456",
                        "primary-fixed": "#dde1ff",
                        "tertiary": "#00211c",
                        "on-primary-fixed": "#001355",
                        "secondary-fixed-dim": "#b7c8e1",
                        "on-primary-fixed-variant": "#324284",
                        "error-container": "#ffdad6",
                        "surface-tint": "#4b5a9e",
                        "primary-fixed-dim": "#b8c3ff",
                        "on-surface": "#1b1b20",
                        "background": "#fbf8ff",
                        "secondary-container": "#d0e1fb",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#003831",
                        "on-tertiary-container": "#00ac9a",
                        "surface-bright": "#fbf8ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-margin": "24px",
                        "sm": "8px",
                        "gutter": "16px",
                        "md": "16px",
                        "lg": "24px",
                        "xs": "4px",
                        "unit": "4px",
                        "xl": "40px"
                    },
                    "fontFamily": {
                        "body-md": ["Spline Sans"],
                        "headline-lg": ["Spline Sans"],
                        "body-lg": ["Spline Sans"],
                        "label-sm": ["Spline Sans"],
                        "headline-md": ["Spline Sans"]
                    },
                    "fontSize": {
                        "body-md": ["14px", { "lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Spline Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex items-center justify-center p-4" style="background-image: radial-gradient(circle at 50% 0%, #fbf8ff 0%, #efedf3 100%);">
<!-- Modal Backdrop -->
<div class="fixed inset-0 z-40 bg-on-background/10 backdrop-blur-sm transition-opacity"></div>
<!-- Modal Container (Liquid Glass Effect) -->
<div class="relative z-50 w-full max-w-[420px] rounded-[24px] bg-surface-container-lowest/80 p-lg shadow-[0_16px_48px_-12px_rgba(0,20,86,0.1),inset_0_1px_0_0_rgba(255,255,255,0.6)] ring-1 ring-surface-container-lowest backdrop-blur-[24px]">
<!-- Header -->
<div class="flex items-center justify-between mb-lg">
<h2 class="font-headline-md text-headline-md text-primary">Invite User</h2>
<button class="h-8 w-8 rounded-full flex items-center justify-center text-outline hover:bg-surface-container hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Body -->
<div class="space-y-lg">
<!-- Email Input -->
<div>
<label class="font-label-sm text-label-sm text-secondary mb-xs block" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-outline pointer-events-none text-[20px]">mail</span>
<input class="w-full rounded-lg bg-surface-container border-0 py-md pl-[44px] pr-md font-body-md text-body-md text-on-surface placeholder:text-outline/70 focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary transition-all outline-none" id="email" placeholder="colleague@company.com" type="email"/>
</div>
</div>
<!-- Access Level Segmented Control -->
<div>
<label class="font-label-sm text-label-sm text-secondary mb-xs block">Access Level</label>
<div class="flex w-full rounded-lg bg-surface-container p-1">
<!-- Active State -->
<button class="flex-1 rounded-md bg-surface-container-lowest py-2.5 font-label-sm text-label-sm text-primary shadow-[0_2px_8px_-2px_rgba(0,0,0,0.05),inset_0_1px_0_0_rgba(255,255,255,0.8)] text-center transition-all">
                        Viewer
                    </button>
<!-- Inactive State -->
<button class="flex-1 rounded-md py-2.5 font-label-sm text-label-sm text-secondary text-center transition-all hover:text-on-surface">
                        Editor
                    </button>
</div>
</div>
</div>
<!-- Footer actions -->
<div class="mt-xl">
<!-- Primary Button with deep-indigo ambient shadow -->
<button class="w-full flex items-center justify-center gap-sm rounded-lg bg-primary py-md px-lg font-label-sm text-label-sm text-on-primary shadow-[0_4px_16px_rgba(0,20,86,0.15)] hover:opacity-90 transition-opacity active:scale-[0.98]">
<span>Send Invite</span>
<span class="material-symbols-outlined text-[18px]">send</span>
</button>
<!-- Small Info Text -->
<p class="mt-md text-center font-body-md text-[12px] leading-tight text-outline">
                An invitation link will be sent to the provided email address. They will have 48 hours to accept.
            </p>
</div>
</div>
</body></html>
