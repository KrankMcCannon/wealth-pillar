<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Transaction Modal</title>
<!-- Google Fonts: Spline Sans -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        /* Custom scrollbar hiding for clean inputs */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#b8c3ff",
                        "on-primary-fixed-variant": "#324284",
                        "on-primary-container": "#8695dd",
                        "on-background": "#1b1b20",
                        "on-error": "#ffffff",
                        "surface-dim": "#dbd9df",
                        "surface-container": "#efedf3",
                        "tertiary": "#00211c",
                        "secondary-fixed-dim": "#b7c8e1",
                        "secondary-fixed": "#d3e4fe",
                        "surface-tint": "#4b5a9e",
                        "on-surface-variant": "#454650",
                        "primary-fixed": "#dde1ff",
                        "tertiary-fixed-dim": "#3cddc7",
                        "tertiary-container": "#003831",
                        "primary-container": "#1a2b6d",
                        "on-surface": "#1b1b20",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#001355",
                        "on-secondary": "#ffffff",
                        "outline-variant": "#c6c5d2",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#303035",
                        "inverse-on-surface": "#f2f0f6",
                        "on-tertiary-fixed": "#00201c",
                        "surface-bright": "#fbf8ff",
                        "on-secondary-fixed-variant": "#38485d",
                        "inverse-primary": "#b8c3ff",
                        "on-tertiary-container": "#00ac9a",
                        "surface": "#fbf8ff",
                        "tertiary-fixed": "#62fae3",
                        "on-tertiary-fixed-variant": "#005047",
                        "primary": "#001456",
                        "surface-variant": "#e4e1e8",
                        "surface-container-high": "#e9e7ee",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#54647a",
                        "secondary": "#505f76",
                        "outline": "#767681",
                        "background": "#fbf8ff",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e4e1e8",
                        "on-secondary-fixed": "#0b1c30",
                        "surface-container-low": "#f5f2f9",
                        "on-primary": "#ffffff",
                        "secondary-container": "#d0e1fb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1.5rem",
                        "3xl": "2rem"
                    },
                    "spacing": {
                        "container-margin": "24px",
                        "xl": "40px",
                        "unit": "4px",
                        "lg": "24px",
                        "sm": "8px",
                        "md": "16px",
                        "gutter": "16px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Spline Sans", "sans-serif"],
                        "label-sm": ["Spline Sans", "sans-serif"],
                        "body-md": ["Spline Sans", "sans-serif"],
                        "body-lg": ["Spline Sans", "sans-serif"],
                        "headline-md": ["Spline Sans", "sans-serif"]
                    },
                    "fontSize": {
                        "headline-lg": ["40px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen relative overflow-hidden font-body-md text-body-md text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Mock Background Canvas (Dashboard) to demonstrate the blur effect -->
<div class="absolute inset-0 pointer-events-none opacity-40">
<!-- TopAppBar (from JSON) -->
<header class="fixed top-0 left-0 w-full z-10 flex items-center justify-between px-6 py-4 h-16 bg-slate-50/80 backdrop-blur-3xl border-b border-white/40 shadow-[0_4px_30px_rgba(0,0,0,0.05)]">
<div class="flex items-center gap-md">
<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<h1 class="font-headline-md text-headline-md font-bold text-primary tracking-tight">Wealth</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/40 transition-colors text-primary">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<!-- Dummy Content -->
<main class="pt-24 px-container-margin pb-32">
<div class="bg-surface-container-lowest rounded-2xl p-lg shadow-sm border border-outline-variant/20 mb-lg">
<p class="font-body-md text-body-md text-secondary mb-xs">Total Balance</p>
<h2 class="font-headline-lg text-headline-lg text-primary">$124,592.00</h2>
</div>
<div class="space-y-sm">
<div class="bg-surface-container-lowest rounded-xl p-md flex items-center justify-between">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center"><span class="material-symbols-outlined text-secondary">shopping_cart</span></div>
<div>
<p class="font-body-lg text-body-lg">Whole Foods</p>
<p class="font-body-md text-body-md text-secondary">Groceries</p>
</div>
</div>
<p class="font-body-lg text-body-lg font-semibold text-on-surface">-$142.50</p>
</div>
</div>
</main>
</div>
<!-- Modal Overlay Backdrop -->
<!-- Dimmed background with subtle blur to focus on the drawer -->
<div class="fixed inset-0 bg-on-background/20 backdrop-blur-sm z-40 transition-opacity duration-300"></div>
<!-- Bottom Drawer Modal (Liquid Glass Style) -->
<div class="fixed bottom-0 left-0 right-0 z-50 transform transition-transform duration-300 ease-out translate-y-0">
<!-- Liquid Glass Container -->
<!-- 80% opacity white, strong backdrop blur, 1px white inner border (rim light) via ring -->
<div class="bg-white/85 backdrop-blur-[24px] ring-1 ring-white/50 ring-inset shadow-[0_-8px_40px_rgba(0,20,86,0.08)] rounded-t-[32px] pt-sm pb-container-margin px-container-margin h-[751px] max-h-[700px] flex flex-col">
<!-- Drag Handle -->
<div class="w-12 h-1.5 bg-outline-variant/40 rounded-full mx-auto mb-md flex-shrink-0"></div>
<!-- Header -->
<div class="flex items-center justify-between mb-xl flex-shrink-0">
<h2 class="font-headline-md text-headline-md text-on-surface">Add Transaction</h2>
<button aria-label="Close modal" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low/50 hover:bg-surface-container-low text-on-surface transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Scrollable Content Area -->
<div class="flex-1 overflow-y-auto hide-scrollbar pb-lg space-y-xl">
<!-- Amount Input (Large Text, Minimalist) -->
<div class="flex flex-col items-center justify-center py-sm">
<p class="font-label-sm text-label-sm text-secondary uppercase tracking-wider mb-sm">Amount</p>
<div class="flex items-center justify-center group w-full">
<span class="font-headline-lg text-headline-lg text-on-surface/40 mr-xs transition-colors group-focus-within:text-primary">$</span>
<input autofocus="" class="bg-transparent border-none p-0 m-0 w-full max-w-[200px] text-center font-headline-lg text-headline-lg text-on-surface focus:ring-0 focus:outline-none placeholder-on-surface/20" placeholder="0.00" step="0.01" type="number" value="0.00"/>
</div>
<!-- Subtle active indicator line -->
<div class="w-32 h-[2px] bg-outline-variant/30 mt-sm rounded-full overflow-hidden">
<div class="h-full bg-primary w-0 transition-all duration-300 group-focus-within:w-full"></div>
</div>
</div>
<!-- Form Fields (Enclosed Light-Grey Fields) -->
<div class="space-y-md">
<!-- Category Selector -->
<button class="w-full flex items-center justify-between bg-surface-container-low hover:bg-surface-container-high transition-colors rounded-xl p-md border border-transparent focus:border-primary focus:outline-none text-left group">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<div>
<p class="font-label-sm text-label-sm text-secondary mb-xs">Category</p>
<p class="font-body-lg text-body-lg text-on-surface group-hover:text-primary transition-colors">Food &amp; Dining</p>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
</button>
<!-- Account Selector -->
<button class="w-full flex items-center justify-between bg-surface-container-low hover:bg-surface-container-high transition-colors rounded-xl p-md border border-transparent focus:border-primary focus:outline-none text-left group">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<div>
<p class="font-label-sm text-label-sm text-secondary mb-xs">Account</p>
<p class="font-body-lg text-body-lg text-on-surface group-hover:text-primary transition-colors">Checking •••• 4291</p>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
</button>
<!-- Date Selector -->
<button class="w-full flex items-center justify-between bg-surface-container-low hover:bg-surface-container-high transition-colors rounded-xl p-md border border-transparent focus:border-primary focus:outline-none text-left group">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-primary">
<span class="material-symbols-outlined">calendar_today</span>
</div>
<div>
<p class="font-label-sm text-label-sm text-secondary mb-xs">Date</p>
<p class="font-body-lg text-body-lg text-on-surface group-hover:text-primary transition-colors">Today</p>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
</button>
<!-- Note / Memo Field -->
<div class="bg-surface-container-low rounded-xl p-md border border-transparent focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
<label class="font-label-sm text-label-sm text-secondary block mb-xs" for="memo">Note</label>
<input class="w-full bg-transparent border-none p-0 font-body-lg text-body-lg text-on-surface placeholder-on-surface/40 focus:ring-0 focus:outline-none" id="memo" placeholder="Add a description..." type="text"/>
</div>
</div>
</div>
<!-- Action Button (Sticky Bottom) -->
<div class="pt-md mt-auto flex-shrink-0 bg-white/50 backdrop-blur-md -mx-container-margin px-container-margin pb-safe">
<button class="w-full bg-primary hover:bg-primary/90 text-on-primary font-label-sm text-label-sm uppercase tracking-widest py-4 rounded-xl shadow-[0_8px_24px_rgba(0,20,86,0.25)] transition-all transform active:scale-[0.98] flex items-center justify-center gap-sm">
<span class="material-symbols-outlined text-[20px]">check</span>
                    Save Transaction
                </button>
</div>
</div>
</div>
<style>
        /* Hide scrollbar for a cleaner look in the modal */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Safe area padding for mobile devices */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .pb-safe {
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
    </style>
</body></html>
