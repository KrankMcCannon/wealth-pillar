<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Currency Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#b8c3ff",
                        "on-primary-fixed-variant": "#324284",
                        "on-primary-container": "#8695dd",
                        "on-background": "#1b1b20",
                        "on-error": "#ffffff",
                        "surface-dim": "#dbd9df",
                        "surface-container": "#efedf3",
                        "tertiary": "#00211c",
                        "secondary-fixed-dim": "#b7c8e1",
                        "secondary-fixed": "#d3e4fe",
                        "surface-tint": "#4b5a9e",
                        "on-surface-variant": "#454650",
                        "primary-fixed": "#dde1ff",
                        "tertiary-fixed-dim": "#3cddc7",
                        "tertiary-container": "#003831",
                        "primary-container": "#1a2b6d",
                        "on-surface": "#1b1b20",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#001355",
                        "on-secondary": "#ffffff",
                        "outline-variant": "#c6c5d2",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#303035",
                        "inverse-on-surface": "#f2f0f6",
                        "on-tertiary-fixed": "#00201c",
                        "surface-bright": "#fbf8ff",
                        "on-secondary-fixed-variant": "#38485d",
                        "inverse-primary": "#b8c3ff",
                        "on-tertiary-container": "#00ac9a",
                        "surface": "#fbf8ff",
                        "tertiary-fixed": "#62fae3",
                        "on-tertiary-fixed-variant": "#005047",
                        "primary": "#001456",
                        "surface-variant": "#e4e1e8",
                        "surface-container-high": "#e9e7ee",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#54647a",
                        "secondary": "#505f76",
                        "outline": "#767681",
                        "background": "#fbf8ff",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e4e1e8",
                        "on-secondary-fixed": "#0b1c30",
                        "surface-container-low": "#f5f2f9",
                        "on-primary": "#ffffff",
                        "secondary-container": "#d0e1fb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-margin": "24px",
                        "xl": "40px",
                        "unit": "4px",
                        "lg": "24px",
                        "sm": "8px",
                        "md": "16px",
                        "gutter": "16px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Spline Sans"],
                        "label-sm": ["Spline Sans"],
                        "body-md": ["Spline Sans"],
                        "body-lg": ["Spline Sans"],
                        "headline-md": ["Spline Sans"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "body-md": ["14px", { "lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #F8FAFC;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#F8FAFC] min-h-screen font-body-md text-body-md text-on-background flex items-center justify-center p-4">
<!-- Modal Overlay Backdrop (Subtle Darkening) -->
<div class="fixed inset-0 bg-primary/20 backdrop-blur-sm z-40"></div>
<!-- Currency Selection Modal -->
<div class="relative z-50 w-full max-w-md bg-white/80 backdrop-blur-[24px] border border-white/40 shadow-[0_8px_32px_rgba(0,20,86,0.08)] rounded-[24px] overflow-hidden flex flex-col max-h-[751px]">
<!-- Header -->
<div class="px-container-margin py-md flex items-center justify-between border-b border-surface-variant/50">
<h2 class="font-headline-md text-headline-md text-primary">Select Currency</h2>
<button class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-variant/50 text-outline transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Search Bar -->
<div class="p-container-margin pb-sm">
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline" data-icon="search">search</span>
<input class="w-full bg-[#F1F5F9] border-none rounded-xl py-3 pl-12 pr-4 font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:bg-white transition-all placeholder:text-outline-variant" placeholder="Search currencies..." type="text"/>
</div>
</div>
<!-- Currency List (Scrollable) -->
<div class="flex-1 overflow-y-auto px-sm pb-container-margin space-y-1 custom-scrollbar">
<!-- Selected Currency -->
<button class="w-full flex items-center justify-between p-3 rounded-xl bg-primary/5 hover:bg-primary/10 transition-colors group">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center border border-surface-variant">
<span class="font-body-lg text-body-lg text-primary font-semibold">US</span>
</div>
<div class="text-left">
<p class="font-body-lg text-body-lg text-on-surface font-medium">USD - US Dollar</p>
</div>
</div>
<span class="material-symbols-outlined text-primary" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</button>
<!-- Unselected Currencies -->
<button class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-surface-variant/30 transition-colors group">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center border border-surface-variant">
<span class="font-body-lg text-body-lg text-on-surface-variant font-semibold">EU</span>
</div>
<div class="text-left">
<p class="font-body-lg text-body-lg text-on-surface font-medium group-hover:text-primary transition-colors">EUR - Euro</p>
</div>
</div>
<span class="material-symbols-outlined text-transparent group-hover:text-outline-variant transition-colors" data-icon="check">check</span>
</button>
<button class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-surface-variant/30 transition-colors group">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center border border-surface-variant">
<span class="font-body-lg text-body-lg text-on-surface-variant font-semibold">GB</span>
</div>
<div class="text-left">
<p class="font-body-lg text-body-lg text-on-surface font-medium group-hover:text-primary transition-colors">GBP - British Pound</p>
</div>
</div>
<span class="material-symbols-outlined text-transparent group-hover:text-outline-variant transition-colors" data-icon="check">check</span>
</button>
<button class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-surface-variant/30 transition-colors group">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center border border-surface-variant">
<span class="font-body-lg text-body-lg text-on-surface-variant font-semibold">JP</span>
</div>
<div class="text-left">
<p class="font-body-lg text-body-lg text-on-surface font-medium group-hover:text-primary transition-colors">JPY - Japanese Yen</p>
</div>
</div>
<span class="material-symbols-outlined text-transparent group-hover:text-outline-variant transition-colors" data-icon="check">check</span>
</button>
<button class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-surface-variant/30 transition-colors group">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center border border-surface-variant">
<span class="font-body-lg text-body-lg text-on-surface-variant font-semibold">CH</span>
</div>
<div class="text-left">
<p class="font-body-lg text-body-lg text-on-surface font-medium group-hover:text-primary transition-colors">CHF - Swiss Franc</p>
</div>
</div>
<span class="material-symbols-outlined text-transparent group-hover:text-outline-variant transition-colors" data-icon="check">check</span>
</button>
<button class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-surface-variant/30 transition-colors group">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center border border-surface-variant">
<span class="font-body-lg text-body-lg text-on-surface-variant font-semibold">CA</span>
</div>
<div class="text-left">
<p class="font-body-lg text-body-lg text-on-surface font-medium group-hover:text-primary transition-colors">CAD - Canadian Dollar</p>
</div>
</div>
<span class="material-symbols-outlined text-transparent group-hover:text-outline-variant transition-colors" data-icon="check">check</span>
</button>
<button class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-surface-variant/30 transition-colors group">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center border border-surface-variant">
<span class="font-body-lg text-body-lg text-on-surface-variant font-semibold">AU</span>
</div>
<div class="text-left">
<p class="font-body-lg text-body-lg text-on-surface font-medium group-hover:text-primary transition-colors">AUD - Australian Dollar</p>
</div>
</div>
<span class="material-symbols-outlined text-transparent group-hover:text-outline-variant transition-colors" data-icon="check">check</span>
</button>
</div>
</div>
</body></html>
