<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>

                      "tertiary-fixed-dim": "#3cddc7",
                      "secondary-fixed": "#d3e4fe",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Liquid Glass Utility Classes */
        .liquid-glass {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.4);
        }
        
        body {
            background-color: #F8FAFC; /* Base layer as per guidance */
            /* Adding a subtle background pattern to show off the glass effect */
            background-image: radial-gradient(circle at 15% 50%, rgba(221, 225, 255, 0.3), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(0, 172, 154, 0.1), transparent 25%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex items-center justify-center p-4">
<!-- Modal Overlay Backdrop (Simplified for context) -->
<div class="fixed inset-0 bg-secondary/20 backdrop-blur-sm z-40"></div>
<!-- Modal Container -->
<div class="liquid-glass rounded-xl w-full max-w-md z-50 relative overflow-hidden">
<!-- Header -->
<div class="px-lg pt-lg pb-md flex justify-between items-start border-b border-surface-variant/50">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Close October Period</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Review your performance before finalizing.</p>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors p-sm rounded-full hover:bg-surface-variant/50">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Content -->
<div class="p-lg space-y-lg">
<!-- Summary Bento Card -->
<div class="bg-surface-container-lowest/50 rounded-lg p-md border border-surface-variant/50">
<div class="flex items-center gap-sm mb-md">
<div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[18px] fill">monitoring</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface uppercase tracking-wider">Period Summary</span>
</div>
<div class="grid grid-cols-2 gap-md">
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant mb-xs">Total Budget</p>
<p class="font-headline-md text-headline-md text-on-surface">$12,500</p>
</div>
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant mb-xs">Actual Spend</p>
<p class="font-headline-md text-headline-md text-primary">$10,240</p>
</div>
</div>
<div class="mt-md pt-md border-t border-surface-variant/50 flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Remaining Balance</span>
<span class="font-body-lg text-body-lg text-on-tertiary-container font-semibold">+$2,260</span>
</div>
</div>
<!-- Action Selection -->
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant mb-sm uppercase tracking-wider">End of Period Action</p>
<div class="space-y-sm">
<!-- Option 1: Carry Over -->
<label class="flex items-start gap-md p-md rounded-lg border border-primary bg-primary-fixed/20 cursor-pointer transition-colors relative">
<div class="pt-xs">
<input checked="" class="form-radio text-primary focus:ring-primary h-4 w-4 border-outline" name="close_action" type="radio"/>
</div>
<div class="flex-1">
<span class="block font-body-md text-body-md text-on-surface font-semibold mb-xs">Carry Over Remaining Funds</span>
<span class="block font-label-sm text-label-sm text-on-surface-variant leading-relaxed">Add $2,260 to the November budget automatically.</span>
</div>
</label>
<!-- Option 2: Clear -->
<label class="flex items-start gap-md p-md rounded-lg border border-surface-variant hover:bg-surface-container-lowest/50 cursor-pointer transition-colors">
<div class="pt-xs">
<input class="form-radio text-primary focus:ring-primary h-4 w-4 border-outline" name="close_action" type="radio"/>
</div>
<div class="flex-1">
<span class="block font-body-md text-body-md text-on-surface font-semibold mb-xs">Clear Balances</span>
<span class="block font-label-sm text-label-sm text-on-surface-variant leading-relaxed">Start November with a fresh, zeroed balance. Remaining funds are sent to savings.</span>
</div>
</label>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="px-lg pb-lg pt-sm flex justify-end gap-sm">
<button class="px-lg py-[10px] rounded-lg font-body-md text-body-md text-on-surface-variant bg-surface-container-lowest border border-outline-variant hover:bg-surface-variant/50 transition-colors">
                Cancel
            </button>
<!-- Primary Action with ambient shadow for depth -->
<button class="px-lg py-[10px] rounded-lg font-body-md text-body-md text-on-primary bg-primary shadow-[0_4px_12px_rgba(0,20,86,0.2)] hover:shadow-[0_6px_16px_rgba(0,20,86,0.3)] hover:-translate-y-[1px] transition-all">
                Close Period
            </button>
</div>
</div>
</body></html>
