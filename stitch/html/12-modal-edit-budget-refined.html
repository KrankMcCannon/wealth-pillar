<style>
        .liquid-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.4);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-mesh {
            background-color: #fbf8ff;
            background-image: 
                radial-gradient(at 0% 0%, rgba(221, 225, 255, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(208, 225, 251, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(184, 195, 255, 0.3) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(245, 242, 249, 1) 0px, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-mesh min-h-screen font-body-md text-on-background antialiased flex flex-col items-center justify-center p-6">
<!-- Background Content (Simulating the App State) -->
<div aria-hidden="true" class="fixed inset-0 w-full h-full opacity-40 pointer-events-none select-none px-6 py-8">
<header class="flex justify-between items-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-primary">Overview</h1>
<span class="material-symbols-outlined text-primary-container">account_circle</span>
</header>
<!-- Wealth Header Background -->
<div class="liquid-glass rounded-xl p-lg mb-lg border-white/20">
<p class="font-label-sm text-label-sm text-secondary uppercase tracking-widest mb-xs">Total Balance</p>
<h2 class="font-headline-lg text-headline-lg text-primary">$42,590.12</h2>
</div>
<!-- Bento Grid Placeholder -->
<div class="grid grid-cols-2 gap-md">
<div class="liquid-glass h-32 rounded-xl border-white/20"></div>
<div class="liquid-glass h-32 rounded-xl border-white/20"></div>
<div class="liquid-glass h-64 col-span-2 rounded-xl border-white/20"></div>
</div>
</div>
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-primary/20 backdrop-blur-md z-40"></div>
<!-- Edit Budget Modal (Liquid Glass) -->
<div class="relative z-50 w-full max-w-md liquid-glass rounded-3xl overflow-hidden animate-in fade-in zoom-in duration-300">
<!-- TopAppBar (Simulated as Modal Header) -->
<div class="flex justify-between items-center w-full px-6 h-16 border-b border-white/40">
<div class="flex items-center gap-md">
<button class="p-2 -ml-2 transition-all duration-300 ease-in-out hover:bg-slate-100/50 rounded-full">
<span class="material-symbols-outlined text-indigo-900">arrow_back</span>
</button>
<span class="font-headline-md text-headline-md text-indigo-900">Edit Budget</span>
</div>
<button class="p-2 -mr-2 transition-all duration-300 ease-in-out hover:bg-slate-100/50 rounded-full">
<span class="material-symbols-outlined text-indigo-900">more_vert</span>
</button>
</div>
<div class="p-lg space-y-lg">
<!-- Budget Name Input -->
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-secondary px-1">Budget Name</label>
<input class="w-full bg-surface-container-low border-none border-b-2 border-transparent focus:ring-0 focus:border-primary px-md py-md rounded-lg text-body-lg font-body-lg text-primary transition-all" placeholder="Enter name..." type="text" value="Monthly Groceries"/>
</div>
<!-- Target Amount Input -->
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-secondary px-1">Target Amount</label>
<div class="relative flex items-center">
<span class="absolute left-md font-headline-md text-primary opacity-60">$</span>
<input class="w-full bg-surface-container-low border-none border-b-2 border-transparent focus:ring-0 focus:border-primary pl-10 pr-md py-md rounded-lg text-headline-md font-headline-md text-primary transition-all" type="number" value="850.00"/>
</div>
</div>
<!-- Categories Included (Removable Tags) -->
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-secondary px-1">Categories Included</label>
<div class="flex flex-wrap gap-sm">
<span class="inline-flex items-center gap-xs px-3 py-1.5 bg-secondary-container text-on-secondary-fixed-variant rounded-full text-label-sm font-label-sm">
                        Supermarkets
                        <button class="material-symbols-outlined text-[16px] leading-none">close</button>
</span>
<span class="inline-flex items-center gap-xs px-3 py-1.5 bg-secondary-container text-on-secondary-fixed-variant rounded-full text-label-sm font-label-sm">
                        Organic Markets
                        <button class="material-symbols-outlined text-[16px] leading-none">close</button>
</span>
<span class="inline-flex items-center gap-xs px-3 py-1.5 bg-secondary-container text-on-secondary-fixed-variant rounded-full text-label-sm font-label-sm">
                        Beverages
                        <button class="material-symbols-outlined text-[16px] leading-none">close</button>
</span>
<button class="inline-flex items-center gap-xs px-3 py-1.5 border border-dashed border-outline-variant text-secondary rounded-full text-label-sm font-label-sm hover:bg-white/50 transition-colors">
<span class="material-symbols-outlined text-[16px]">add</span>
                        Add Category
                    </button>
</div>
</div>
<!-- Period Segmented Control -->
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-secondary px-1">Period</label>
<div class="grid grid-cols-3 bg-surface-container-high p-1 rounded-xl">
<button class="py-2 text-label-sm font-label-sm text-slate-500 hover:text-primary transition-all">Weekly</button>
<button class="py-2 text-label-sm font-label-sm bg-white text-primary rounded-lg shadow-sm font-bold">Monthly</button>
<button class="py-2 text-label-sm font-label-sm text-slate-500 hover:text-primary transition-all">Yearly</button>
</div>
</div>
<!-- Actions Area -->
<div class="pt-md space-y-md">
<button class="w-full h-14 bg-primary text-on-primary font-headline-md text-body-lg rounded-xl flex items-center justify-center gap-sm active:scale-95 transition-transform duration-200 shadow-xl shadow-primary/20">
                    Save Changes
                </button>
<button class="w-full flex items-center justify-center gap-xs py-2 text-error font-label-sm text-label-sm hover:bg-error-container/20 rounded-lg transition-colors group">
<span class="material-symbols-outlined text-[18px] group-hover:scale-110 transition-transform">delete</span>
                    Delete Budget
                </button>
</div>
</div>
<!-- Decorative Rim Highlight -->
<div class="absolute inset-0 pointer-events-none rounded-3xl border border-white/60"></div>
</div>
<!-- BottomNavBar (Suppressed for task focus/modal overlay) -->
<!-- The BottomNavBar is visually excluded to prioritize the focus on the "Edit Budget" transactional modal. -->
</body></html>
